{% extends "base.html" %}
{% block content %}

<div class="page-wrapper">

    <div class="page-header">
        <h1>Add Project</h1>
        <a href="{{ url_for('dashboard') }}" class="btn-back">← Back</a>
    </div>

    <div class="card-section">

        <form method="POST" enctype="multipart/form-data">

            <!-- PROJECT NAME -->
            <div class="form-group">
                <label>Project Name</label>
                <input type="text" name="name" required>
            </div>

            <!-- CONTRACT VALUE -->
            <div class="form-group">
                <label>Contract Value</label>
                <input type="number" step="0.01" name="contract_value">
            </div>

            <!-- SUBCONTRACTORS -->
            <div class="form-group">
                <label>Select Subcontractors</label>

                <div class="checkbox-grid">
                    {% for sub in subs %}
                        <label class="checkbox-item">
                            <input type="checkbox" name="subcontractors" value="{{ sub.id }}">
                            {{ sub.name }}
                        </label>
                    {% endfor %}
                </div>
            </div>

            <!-- DOCUMENT TYPE -->
            <div class="form-group">
                <label>Document Type</label>

                <select name="doc_type">
                    <option value="Contract">Contract</option>
                    <option value="Subcontract">Subcontract</option>
                    <option value="Insurance">Insurance</option>
                    <option value="Permit">Permit</option>
                    <option value="Safety Plan">Safety Plan</option>
                    <option value="Change Order">Change Order</option>
                </select>
            </div>

            <!-- FILE UPLOAD -->
            <div class="form-group">
                <label>Upload Project Documents</label>

                <input type="file" name="documents" multiple>
            </div>

            <button type="submit" class="btn-save">
                Create Project
            </button>

        </form>

    </div>

</div>

<style>

.form-group {
    margin-bottom: 25px;
}

.form-group label {
    font-weight: 600;
    display: block;
    margin-bottom: 8px;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.checkbox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
}

.checkbox-item {
    background: #f9fafb;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    gap: 8px;
    align-items: center;
}

.btn-save {
    background: #16a34a;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
}

.btn-save:hover {
    background: #15803d;
}

.btn-back {
    text-decoration: none;
    color: #2563eb;
    font-weight: 600;
}

</style>

{% endblock %}
