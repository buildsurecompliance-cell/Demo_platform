{% extends "base.html" %}
{% block content %}

<div class="page-wrapper">

    <div class="page-header">
        <h1>Add Project</h1>
        <a href="{{ url_for('dashboard') }}" class="btn-back">← Back</a>
    </div>

    <div class="card-section">

        <form method="POST" enctype="multipart/form-data">

            <!-- PROJECT NAME -->
            <div class="form-group">
                <label>Project Name</label>
                <input type="text" name="name" required>
            </div>

            <!-- CONTRACT VALUE -->
            <div class="form-group">
                <label>Contract Value</label>
                <input type="number" step="0.01" name="contract_value">
            </div>

            <!-- START DATE -->
            <div class="form-group">
                <label>Start Date</label>
                <input type="date" name="start_date">
            </div>

            <!-- END DATE -->
            <div class="form-group">
                <label>End Date</label>
                <input type="date" name="end_date">
            </div>

            <!-- SUBCONTRACTORS -->
            <div class="form-group">

                <label>Select Subcontractors</label>

                <input type="text"
                    id="subSearch"
                    placeholder="Search subcontractor..."
                    class="search-input">

                <div class="checkbox-grid" id="subsList">

                {% for sub in subs %}

                <label class="checkbox-item sub-item">

                    <input type="checkbox"
                        name="subcontractors"
                        value="{{ sub.id }}">

                    <span class="sub-name">
                        {{ sub.name }}
                    </span>

                </label>

                {% endfor %}

                </div>

            </div>

            <!-- DOCUMENT TYPE -->
            <div class="form-group">
                <label>Document Type</label>

                <select name="doc_type">
                    <option value="Contract">Contract</option>
                    <option value="Subcontract">Subcontract</option>
                    <option value="Insurance">Insurance</option>
                    <option value="Permit">Permit</option>
                    <option value="Safety Plan">Safety Plan</option>
                    <option value="Change Order">Change Order</option>
                </select>
            </div>

            <!-- FILE UPLOAD -->
            <div class="form-group">
                <label>Upload Project Documents</label>

                <input type="file" name="documents" multiple>
            </div>

            <button type="submit" class="btn-save">
                Create Project
            </button>

        </form>

    </div>

</div>

<style>

.form-group {
    margin-bottom: 25px;
}

.form-group label {
    font-weight: 600;
    display: block;
    margin-bottom: 8px;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #000000;
}

.checkbox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    max-height: 250px;
    overflow-y: auto;
}

.checkbox-item {
    background: #f9fafb;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    gap: 8px;
    align-items: center;
}

.search-input {
    margin-bottom: 10px;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 100%;
}

.btn-save {
    background: #16a34a;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
}

.btn-save:hover {
    background: #15803d;
}

.btn-back {
    text-decoration: none;
    color: #2563eb;
    font-weight: 600;
}

/* DARK MODE */

.dark-mode .checkbox-item {
    background: #1e293b;
    color: white;
    border: 1px solid #334155;
}

.dark-mode .checkbox-item input {
    accent-color: #16a34a;
}

.dark-mode .form-group input,
.dark-mode .form-group select {
    background: #0f172a;
    color: white;
    border: 1px solid #334155;
}

.dark-mode .form-group label {
    color: #e2e8f0;
}

</style>

<script>

document
.getElementById("subSearch")
.addEventListener("keyup", function(){

let filter = this.value.toLowerCase()

let subs = document.querySelectorAll(".sub-item")

subs.forEach(function(item){

let name = item
.querySelector(".sub-name")
.innerText
.toLowerCase()

if(name.includes(filter)){
item.style.display = "flex"
} else {
item.style.display = "none"
}

})

})

</script>

{% endblock %}
