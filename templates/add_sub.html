{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-md-7">
        <h3 class="mb-4">{{ 'Edit Subcontractor' if sub else 'Add Subcontractor' }}</h3>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label>Name</label>
                <input type="text" class="form-control" name="name" value="{{ sub.name if sub else '' }}" required>
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" name="email" value="{{ sub.email if sub else '' }}" required>
            </div>
            <div class="mb-3">
                <label>Phone</label>
                <input type="text" class="form-control" name="phone" value="{{ sub.phone if sub else '' }}">
            </div>
            <div class="mb-3">
                <label>Role</label>
                <input type="text" class="form-control" name="role" value="{{ sub.role if sub else '' }}">
            </div>
            <div class="mb-3">
                <label>COI Expiration</label>
                <input type="date" class="form-control" name="coi_expiration" value="{{ sub.coi_expiration if sub else '' }}" required>
            </div>

            <!-- TIMEZONE AUTOMATICO -->
            <input type="hidden" name="timezone" id="timezoneInputHidden">

            <div class="mb-3">
                <label>Upload Documents</label>
                <input type="file" class="form-control" name="documents" multiple>
            </div>
            <div class="mb-3">
                <label>Document Type</label>
                <input type="text" class="form-control" name="doc_type" placeholder="Ex: COI, Contract">
            </div>
            <button type="submit" class="btn btn-success">{{ 'Update' if sub else 'Add' }}</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

<script>
  // Detecta automaticamente o timezone do navegador
  document.getElementById("timezoneInputHidden").value = Intl.DateTimeFormat().resolvedOptions().timeZone || "US/Eastern";
</script>
{% endblock %}
