{% extends "base.html" %}
{% block content %}

<h3>Edit Project</h3>

<form method="POST">
    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name"
               class="form-control"
               value="{{ project.name }}">
    </div>

    <div class="mb-3">
        <label>Contract Value</label>
        <input type="number" step="0.01"
               name="contract_value"
               class="form-control"
               value="{{ project.contract_value }}">
    </div>

    <button type="submit" class="btn btn-success">
        Save Changes
    </button>
</form>

{% endblock %}
