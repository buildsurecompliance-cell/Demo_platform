{% extends "base.html" %}
{% block content %}

<div class="page-wrapper">

<h3>Edit Project</h3>

<!-- ========================= -->
<!-- EDIT PROJECT -->
<!-- ========================= -->

<form method="POST">

    <div class="mb-3">
        <label>Project Name</label>

        <input type="text"
               name="name"
               class="form-control"
               value="{{ project.name }}"
               required>
    </div>

    <div class="mb-3">
        <label>Contract Value</label>

        <input type="number"
               step="0.01"
               name="contract_value"
               class="form-control"
               value="{{ project.contract_value }}">
    </div>

    <!-- START DATE -->

    <div class="mb-3">
        <label>Start Date</label>

        <input type="date"
               name="start_date"
               class="form-control"
               value="{{ project.start_date }}">
    </div>

    <!-- END DATE -->

    <div class="mb-3">
        <label>End Date</label>

        <input type="date"
               name="end_date"
               class="form-control"
               value="{{ project.end_date }}">
    </div>

    <!-- CONTRACT STATUS INFO -->

    {% if project.end_date %}

    <div class="alert alert-info">

        Contract Status:
        <strong>{{ project.contract_status }}</strong>

        <br>

        Days Remaining:
        <strong>{{ project.days_remaining }}</strong>

    </div>

    {% endif %}

    <!-- ========================= -->
    <!-- SUBCONTRACTORS -->
    <!-- ========================= -->

    <label>Subcontractors</label>

    <select name="subcontractors"
            multiple
            class="form-control"
            style="height:200px">

        {% for sub in subs %}

        <option value="{{ sub.id }}"

        {% for link in project.subs %}
            {% if link.subcontractor_id == sub.id %}
                selected
            {% endif %}
        {% endfor %}

        >

        {{ sub.name }}

        </option>

        {% endfor %}

    </select>

    <br>

    <button type="submit" class="btn btn-success">
        Save Changes
    </button>

</form>


<br><br>


<!-- ========================= -->
<!-- UPLOAD DOCUMENT -->
<!-- ========================= -->

<h4>Upload Document</h4>

<form action="{{ url_for('upload_project_document', project_id=project.id) }}"
      method="POST"
      enctype="multipart/form-data">

    <div class="mb-3">

        <input type="file"
               name="file"
               class="form-control"
               required>

    </div>

    <div class="mb-3">

        <select name="doc_type"
                class="form-control"
                required>

            <option value="">Select document type</option>

            <option value="Contract">Contract</option>
            <option value="Subcontract">Subcontract</option>
            <option value="Insurance">Insurance</option>
            <option value="Permit">Permit</option>
            <option value="Safety Plan">Safety Plan</option>
            <option value="Change Order">Change Order</option>

        </select>

    </div>

    <button type="submit" class="btn btn-primary">
        Upload Document
    </button>

</form>

</div>

{% endblock %}
